<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مرحباً بك في لغة البيان</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a12;color:#e0e0e0;text-align:center;padding:30px 15px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
h1{color:#d4af37;font-size:2.5em;margin-bottom:5px;animation:fadeIn 1s}
.sub{color:#aaa;font-size:1.1em;margin-bottom:30px;animation:fadeIn 1.5s}
.verse{color:#666;font-style:italic;margin-bottom:40px;font-size:1.2em;animation:fadeIn 2s}
.btn{display:block;width:100%;max-width:350px;margin:12px auto;padding:16px;border-radius:12px;text-decoration:none;font-weight:700;font-size:1.1em;animation:fadeIn 2.5s;transition:0.3s}
.btn.start{background:#d4af37;color:#0a0a12}
.btn.start:hover{background:#e0b840;transform:scale(1.03)}
.btn.code{background:#111;border:2px solid #d4af37;color:#d4af37}
.btn.code:hover{background:#1a1a2e}
.stats{display:flex;gap:30px;margin:40px 0;flex-wrap:wrap;justify-content:center;animation:fadeIn 2s}
.stat{text-align:center}
.stat .num{font-size:2.5em;color:#d4af37;font-weight:900}
.stat .label{color:#666;font-size:0.9em}
.footer{margin-top:50px;color:#666;font-size:0.85em;animation:fadeIn 3s}
.footer .gold{color:#d4af37}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<h1>🕌 مرحباً بك في لغة البيان</h1>
<p class="sub">أول لغة برمجة عربية أصلية</p>
<p class="verse">"الرَّحْمَٰنُ عَلَّمَ الْقُرْآنَ خَلَقَ الْإِنسَانَ عَلَّمَهُ الْبَيَانَ"</p>

<div class="stats">
<div class="stat"><div class="num">20</div><div class="label">برنامجاً جاهزاً</div></div>
<div class="stat"><div class="num">6</div><div class="label">مجالات</div></div>
<div class="stat"><div class="num">90+</div><div class="label">اختباراً</div></div>
<div class="stat"><div class="num">35+</div><div class="label">جذراً</div></div>
</div>

<a href="/دفتر_البيان.html" class="btn start">✍️ ابدأ بكتابة كودك الأول</a>
<a href="https://github.com/Sham4753/al-bayan-compiler" class="btn code">📦 استكشف المستودع</a>

<div class="footer">
<p>🕌 <span class="gold">لغة البيان</span> | ✨ الكود قرآن</p>
<p>من <span class="gold">حران العواميد</span> إلى العالم</p>
</div>

</body>
</html>
