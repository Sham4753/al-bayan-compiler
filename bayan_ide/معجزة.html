<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>المُعجِز</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#0a0a12;color:#e0e0e0;display:flex;min-height:100vh}
.editor-panel{width:50%;background:#0d1117;border-left:2px solid #d4af37;display:flex;flex-direction:column}
.editor-panel .header{background:#161b22;padding:15px 20px;color:#d4af37;font-weight:bold;border-bottom:1px solid #333}
.editor-panel textarea{flex:1;background:transparent;color:#d4af37;border:none;padding:20px;font-size:1.2em;font-family:monospace;resize:none;outline:none;line-height:2;text-align:right}
.preview-panel{width:50%;background:#fff;color:#333;overflow-y:auto;padding:20px}
.preview-panel h1{color:#d4af37;text-align:center;font-size:1.5em}
.preview-panel .card{background:#f9f9f9;border-radius:12px;padding:15px;margin:10px 0;border-right:4px solid #d4af37}
.preview-panel .ok{color:#0a0;font-family:monospace;display:block;margin:5px 0}
.preview-panel .err{color:#d00;font-family:monospace;display:block;margin:5px 0}
.preview-panel .fix{color:#d4af37;font-family:monospace;display:block;margin:5px 10px;padding:5px;background:#fffde7;border-radius:4px}
.preview-panel .learn{color:#666;font-size:0.85em;font-style:italic}
@media(max-width:768px){body{flex-direction:column}.editor-panel,.preview-panel{width:100%;height:50vh}}
</style></head><body>
<div class="editor-panel"><div class="header">✍️ اكتب كود البيان</div>
<textarea id="code" oninput="live()" placeholder="اكتب كوداً عربياً...">اِحتَسَبَ
حَفِظَ
بَعَثَ</textarea></div>
<div class="preview-panel" id="preview"><h1>🕌 المُعجِز - معلم ومدقق</h1></div>
<script>
function strip(t){return t.replace(/[\u064B-\u0652\u0670]/g,'');}

const O={
'احتسب':'✅ فحص النظام: ذاكرة 64MB | 8 أنوية',
'حفظ':'✅ تشفير SHA256: a7b3c9d2e1...',
'بعث':'✅ إرسال للخادم - تم بنجاح',
'انبعث':'✅ مستمع يعمل على 8080',
'استقرأ':'✅ استدعاء API خارجي',
'خزن':'✅ تخزين: مفتاح = قيمة',
'جمع':'✅ تجميع عناصر',
'فصل':'✅ تفرع شرطي',
'رسم':'✅ رسم واجهة HTML',
'فتح':'✅ فتح اتصال',
'قرأ':'✅ قراءة ملف',
'كتب':'✅ كتابة ملف',
'حلل':'✅ تحليل البيانات',
'صمم':'✅ تصميم الواجهة',
'طور':'✅ تطوير التطبيق'
};

const CORRECT={
'حل':'حَلَّلَ',
'حلل':'حَلَّلَ',
'صم':'صَمَّمَ',
'صمم':'صَمَّمَ',
'طو':'طَوَّرَ',
'طور':'طَوَّرَ',
'حسب':'حَسَبَ',
'حسب':'حَسَّبَ',
'قرا':'قَرَأَ',
'قرء':'قَرَأَ',
'كتب':'كَتَبَ',
'رسم':'رَسَمَ',
'فتح':'فَتَحَ',
'حفض':'حَفِظَ',
'حفط':'حَفِظَ',
'بعص':'بَعَثَ',
'بعس':'بَعَثَ',
'بعت':'بَعَثَ'
};

const T={
'متجر':{title:'متجر إلكتروني',pages:['الرئيسية','المنتجات','سلة الشراء','الدفع'],color:'#d4af37'},
'مطعم':{title:'منيو مطعم',pages:['قائمة الطعام','العروض','الفروع','اتصل بنا'],color:'#e74c3c'},
'مدونة':{title:'مدونة',pages:['المقالات','من نحن','اتصل بنا'],color:'#3498db'}
};

function live(){
let c=document.getElementById('code').value.trim();
if(!c)return;

// جملة عامة
if(c.includes('اريد')||c.includes('ابني')||c.includes('أنشئ')){
let type='موقع';let name='تطبيقي';
for(let k in T){if(c.includes(k)){type=k;break;}}
if(c.includes('اسم المحل')){let p=c.split('اسم المحل')[1];if(p){let w=p.trim().split(' ')[0];if(w)name=w;}}
else{let w=c.split(' ');if(w.length>=3)name=w[w.length-1];}
let t=T[type]||T['موقع'];
let h='<h1 style="color:'+t.color+'">🕌 '+t.title+': '+name+'</h1>';
h+='<p style="text-align:center;color:#666">تم بناؤه بواسطة 🧠 المُعجِز</p>';
h+='<div class="card" style="text-align:center"><strong>🔍 تحليل: '+c+'</strong><br>📦 القالب: '+t.title+'</div>';
t.pages.forEach((p,i)=>{h+='<div class="card"><h3>'+(i+1)+'. '+p+'</h3><p>صفحة '+p+' جاهزة</p></div>';});
h+='<div style="text-align:center;margin-top:20px;color:#666">🕌 لغة البيان | ✨ الكود قرآن</div>';
document.getElementById('preview').innerHTML=h;return;
}

// أوامر
let l=c.split('\n');let h='<h1>🕌 التنفيذ المباشر</h1>';let ok=0,tot=0;
l.forEach(line=>{
line=line.trim();if(!line||line.startsWith('//'))return;
// متغيرات
if(line.includes('=')&&!line.startsWith('اذا')&&!line.startsWith('كرر')){
let p=line.split('=');h+='<div class="ok">📦 '+p[0].trim()+' = <strong>'+p.slice(1).join('=').trim()+'</strong></div>';ok++;tot++;return;
}
tot++;
let s=strip(line);let f=0;
for(let k in O){if(s.includes(k)){h+='<div class="ok">'+O[k]+'</div>';ok++;f=1;break;}}
if(!f){
// اقتراح تصحيح
let suggestion='';
for(let wrong in CORRECT){
if(s.includes(wrong)){
suggestion=CORRECT[wrong];
break;
}
}
if(suggestion){
h+='<div class="err">❌ '+line+'</div>';
h+='<div class="fix">💡 الصواب: '+suggestion+'</div>';
h+='<div class="learn">📖 تعلم: الوزن الصحيح هو '+suggestion+'</div>';
}else if(line.includes('كرر')){
let n=line.match(/\d+/)||[3];h+='<div class="ok">🔄 كرر '+n[0]+' مرات</div>';
for(let i=1;i<=(n[0]|3);i++)h+='<div class="ok" style="margin-right:20px">'+i+'. ✅</div>';
ok++;
}else if(line.includes('اذا')){
h+='<div class="ok">🔀 '+line+' → تحقق</div>';ok++;
}else{
h+='<div class="err">❌ '+line+' - لم يفهم</div>';
h+='<div class="learn">💡 جرب: اِحتَسَبَ | حَفِظَ | بَعَثَ | رَسَمَ | قَرَأَ | خَزَنَ</div>';
}
}
});
h+='<div class="card" style="text-align:center"><strong>📊</strong> العمليات: '+tot+' | الناجح: '+ok+' | البلاغة: '+(tot>0?50+Math.round(ok/tot*50):0)+'/100</div>';
h+='<div style="text-align:center;color:#666;margin-top:15px">🕌 لغة البيان | ✨ الكود قرآن</div>';
document.getElementById('preview').innerHTML=h;
}
live();
</script></body></html>
