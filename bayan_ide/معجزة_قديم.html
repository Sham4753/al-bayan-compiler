<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المُعجِز - محرر حي</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#0a0a12;color:#e0e0e0;display:flex;min-height:100vh}
.editor-panel{width:50%;background:#0d1117;border-left:2px solid #d4af37;display:flex;flex-direction:column}
.editor-panel .header{background:#161b22;padding:15px 20px;color:#d4af37;font-weight:bold;border-bottom:1px solid #333}
.editor-panel textarea{flex:1;background:transparent;color:#d4af37;border:none;padding:20px;font-size:1.3em;font-family:monospace;resize:none;outline:none;line-height:2;text-align:right}
.preview-panel{width:50%;background:#fff;color:#333;overflow-y:auto;padding:20px}
.preview-panel h1{color:#d4af37}
.preview-panel .card{background:#f5f5f5;border-radius:8px;padding:15px;margin:10px 0;border-right:3px solid #d4af37}
.preview-panel .ok{color:#0f0;background:#0a0a12;padding:2px 8px;border-radius:4px;font-family:monospace;font-size:0.85em;margin:5px 0;display:inline-block}
.preview-panel .err{color:#f44;background:#0a0a12;padding:2px 8px;border-radius:4px;font-family:monospace;font-size:0.85em}
.preview-panel .footer{color:#999;margin-top:20px;text-align:center;font-size:0.85em}
@media(max-width:768px){body{flex-direction:column}.editor-panel,.preview-panel{width:100%;height:50vh}}
</style>
</head>
<body>
<div class="editor-panel">
<div class="header">✍️ اكتب كود البيان هنا</div>
<textarea id="code" placeholder="اِحتَسَبَ
حَفِظَ
بَعَثَ
رَسَمَ
قَرَأَ" oninput="liveUpdate()">اِحتَسَبَ
حَفِظَ
بَعَثَ</textarea>
</div>
<div class="preview-panel" id="preview">
<h1>🕌 معاينة حية</h1>
<p style="color:#666">اكتب في المربع... التطبيق يبني نفسه هنا</p>
</div>

<script>
const ops = {
    "اِحتَسَبَ":{msg:"✅ فحص النظام: ذاكرة 64MB | 8 أنوية",icon:"🖥️"},
    "حَفِظَ":{msg:"✅ تشفير SHA256: a7b3c9d2e1...",icon:"🛡️"},
    "بَعَثَ":{msg:"✅ تم الإرسال إلى الخادم",icon:"📡"},
    "اِنبَعَثَ":{msg:"✅ المستمع يعمل على المنفذ 8080",icon:"👂"},
    "اِستَقرَأَ":{msg:"✅ استجابة API: تم جلب البيانات",icon:"🌐"},
    "خَزَنَ":{msg:"✅ تخزين: مفتاح = قيمة",icon:"📦"},
    "جَمَعَ":{msg:"✅ تجميع: [عنصر1، عنصر2، عنصر3]",icon:"📊"},
    "فَصَلَ":{msg:"✅ تفرع شرطي: إذا تحقق → نفذ",icon:"🔀"},
    "رَسَمَ":{msg:"✅ واجهة HTML: تم الرسم",icon:"🎨"},
    "فَتَحَ":{msg:"✅ فتح اتصال: المنفذ مفتوح",icon:"🔗"},
    "قَرَأَ":{msg:"✅ قراءة ملف: محتوى تجريبي",icon:"📖"},
    "كَتَبَ":{msg:"✅ كتابة ملف: تم الحفظ",icon:"✍️"},
    "حَلَّلَ":{msg:"✅ تحليل: البيانات جاهزة",icon:"🔬"},
    "صَمَّمَ":{msg:"✅ تصميم: الواجهة جاهزة",icon:"🎯"},
    "طَوَّرَ":{msg:"✅ تطوير: تم التحديث",icon:"⚡"}
};

function بدون_حركات(نص){ return نص.replace(/[\u064B-\u0652\u0670]/g, ''); }

function liveUpdate(){
    let code = document.getElementById('code').value;
    let lines = code.split('\n');
    let html = '<h1 style="color:#d4af37">🕌 تطبيق البيان</h1>';
    html += '<p style="color:#666;margin-bottom:20px">يبني نفسه مباشرة...</p>';
    
    let success = 0;
    let total = 0;
    
    lines.forEach(line => {
        line = line.trim();
        if(!line || line.startsWith('//')) return;
        total++;
        
        let clean = بدون_حركات(line);
        let found = false;
        
        for(let key in ops){
            if(clean.includes(key.replace(/[\u064B-\u0652\u0670]/g,""))){
                html += '<div class="card"><strong>' + ops[key].icon + ' ' + key + '</strong><br>' + ops[key].msg + '</div>';
                found = true;
                success++;
                break;
            }
        }
        
        if(!found){
            if(line.includes('كرر')){
                let num = line.match(/\d+/) || [3];
                html += '<div class="card"><strong>🔄 ' + line + '</strong><br>';
                for(let i=1; i<=(parseInt(num[0])||3); i++){
                    html += '<span class="ok">' + i + '. ✅ تم</span> ';
                }
                html += '</div>';
                success++;
            } else if(line.includes('إذا')){
                html += '<div class="card"><strong>🔀 ' + line + '</strong><br><span class="ok">✅ تحقق الشرط</span></div>';
                success++;
            } else if(line.includes('دالة')){
                html += '<div class="card"><strong>🧠 ' + line + '</strong><br><span class="ok">✅ تم تعريف الدالة</span></div>';
                success++;
            } else {
                html += '<div style="padding:10px;margin:5px 0"><span class="err">❌ لم يفهم: ' + line + '</span></div>';
            }
        }
    });
    
    html += '<div style="margin-top:20px;padding:15px;background:#f9f9f9;border-radius:8px;text-align:center">';
    html += '<strong>📊 الإحصائيات</strong><br>';
    html += 'العمليات: ' + total + ' | الناجح: ' + success;
    if(total > 0){
        html += ' | النسبة: ' + Math.round(success/total*100) + '%';
        html += ' | درجة البلاغة: ' + (60 + Math.round(success/total*40)) + '/100';
    }
    html += '</div>';
    
    html += '<div class="footer"><p>🕌 لغة البيان | ✨ الكود قرآن</p><p>من حران العواميد إلى العالم</p></div>';
    
    document.getElementById('preview').innerHTML = html;
}

// تشغيل أولي
liveUpdate();
</script>
</body>
</html>
