<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر البيان - محرر احترافي</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0a0a12;color:#e0e0e0;display:flex;height:100vh}
.sidebar{width:50px;background:#111;display:flex;flex-direction:column;align-items:center;padding-top:10px;border-left:1px solid #222}
.sidebar .icon{color:#666;font-size:1.3em;margin:15px 0;cursor:pointer}
.sidebar .icon:hover{color:#d4af37}
.sidebar .icon.active{color:#d4af37}
.editor{flex:1;display:flex;flex-direction:column}
.editor .tabs{display:flex;background:#0d1117;border-bottom:1px solid #222}
.editor .tab{padding:10px 20px;color:#666;cursor:pointer;border-bottom:2px solid transparent;font-size:0.85em}
.editor .tab:hover{color:#d4af37}
.editor .tab.active{color:#d4af37;border-bottom:2px solid #d4af37}
.editor .line-numbers{display:flex}
.editor .numbers{width:40px;background:#0d1117;padding:15px 0;text-align:center;color:#444;font-size:0.85em;line-height:1.8;user-select:none;overflow:hidden}
.editor textarea{flex:1;background:transparent;color:#d4af37;border:none;padding:15px 10px;font-size:1.1em;font-family:monospace;resize:none;outline:none;line-height:1.8;tab-size:4;white-space:pre;overflow:auto}
.preview{width:45%;background:#fff;color:#333;overflow-y:auto;padding:20px;border-right:1px solid #ddd}
.preview h1{color:#d4af37;font-size:1.5em}
.preview h2{color:#333;font-size:1.2em;margin:15px 0 10px}
.preview .var{background:#f0f0f0;padding:8px 12px;border-radius:6px;margin:5px 0;font-family:monospace;font-size:0.9em}
.preview .card{background:#f9f9f9;border-radius:10px;padding:15px;margin:10px 0;border-right:3px solid #d4af37}
.preview .ok{color:#0a0;font-family:monospace;font-size:0.85em}
.preview .err{color:#d00;font-family:monospace;font-size:0.85em}
.statusbar{background:#161b22;padding:6px 15px;color:#666;font-size:0.8em;display:flex;justify-content:space-between;border-top:1px solid #222}
.statusbar .gold{color:#d4af37}
@media(max-width:768px){.preview{display:none}}
</style>
</head>
<body>

<div class="sidebar">
<div class="icon active" title="الملفات">📁</div>
<div class="icon" title="بحث">🔍</div>
<div class="icon" title="المُعجِز">🧠</div>
<div class="icon" title="تشغيل" onclick="runCode()">▶️</div>
</div>

<div class="editor">
<div class="tabs">
<div class="tab active">📝 برنامجي.بيان</div>
<div class="tab">🟢 معاينة</div>
</div>
<div class="line-numbers">
<div class="numbers" id="lineNumbers">1<br>2<br>3<br>4<br>5</div>
<textarea id="code" oninput="updateLines();livePreview();" placeholder="اكتب كود البيان هنا...
مثلاً:
اسم_المحل = حران
عدد_الصنف = 10
اِحتَسَبَ
حَفِظَ
بَعَثَ">اسم_المحل = حران
عدد_الصنف = 10
اسم_التطبيق = اسم_المحل

اِحتَسَبَ
حَفِظَ
بَعَثَ</textarea>
</div>
<div class="statusbar">
<span>🕌 دفتر البيان</span>
<span class="gold">✨ الكود قرآن</span>
<span>Ln <span id="lineCount">5</span></span>
</div>
</div>

<div class="preview" id="preview">
<h1>🕌 معاينة حية</h1>
<p style="color:#666">اكتب الكود... النتيجة تظهر هنا</p>
</div>

<script>
let variables={};

function updateLines(){
let l=document.getElementById('code').value.split('\n').length;
let n='';for(let i=1;i<=Math.max(l,5);i++)n+=i+'<br>';
document.getElementById('lineNumbers').innerHTML=n;
document.getElementById('lineCount').textContent=l;
}

function strip(t){return t.replace(/[\u064B-\u0652\u0670]/g,'');}

const O={
'احتسب':'فحص النظام: ذاكرة 64MB | 8 أنوية',
'حفظ':'تشفير SHA256: a7b3c9d2e1...',
'بعث':'إرسال للخادم - تم',
'انبعث':'مستمع 8080 - يعمل',
'استقرأ':'استدعاء API - تم',
'خزن':'تخزين - تم',
'جمع':'تجميع - [عنصر1, عنصر2]',
'فصل':'تفرع - تم',
'رسم':'واجهة HTML - تم',
'فتح':'فتح اتصال - تم',
'قرأ':'قراءة ملف - تم',
'كتب':'كتابة ملف - تم'
};

function livePreview(){
let c=document.getElementById('code').value;
let l=c.split('\n');
let h='<h1>🕌 معاينة حية</h1>';
let out='';
let errors=0;

// Parse variables
l.forEach(line=>{
line=line.trim();
if(!line||line.startsWith('//'))return;

// متغير: اسم = قيمة
if(line.includes('=')&&!line.startsWith('اذا')&&!line.startsWith('كرر')){
let p=line.split('=');
if(p.length>=2){
let varName=p[0].trim();
let varValue=p.slice(1).join('=').trim();
variables[varName]=varValue;
out+='<div class="var">📦 '+varName+' = <strong>'+varValue+'</strong></div>';
return;
}
}

let s=strip(line);
let f=0;
for(let k in O){
if(s.includes(k)){
out+='<div class="ok">✅ '+O[k]+'</div>';
f=1;break;
}
}
if(!f){
if(line.includes('كرر')){
let n=line.match(/\d+/)||[3];
out+='<div class="ok">🔄 كرر '+n[0]+' مرات</div>';
for(let i=1;i<=(n[0]|3);i++)out+='<div class="ok" style="margin-right:20px">'+i+'. ✅</div>';
}else if(line.includes('اذا')){
out+='<div class="ok">🔀 '+line+' → تحقق</div>';
}else{
out+='<div class="err">❌ '+line+'</div>';
errors++;
}
}
});

// Replace variables in output
for(let v in variables){
out=out.replace(new RegExp(v,'g'),'<strong>'+variables[v]+'</strong>');
}

h+=out;

if(Object.keys(variables).length>0){
h+='<div class="card"><h2>📦 المتغيرات</h2>';
for(let v in variables){
h+='<div>'+v+' = <strong>'+variables[v]+'</strong></div>';
}
h+='</div>';
}

let total=l.filter(x=>x.trim()&&!x.trim().startsWith('//')).length;
let success=total-errors;
h+='<div style="margin-top:20px;padding:10px;background:#f9f9f9;border-radius:8px;text-align:center">';
h+='📊 العمليات: '+total+' | الناجح: '+success;
if(total>0)h+=' | البلاغة: '+(50+Math.round(success/total*50))+'/100';
h+='</div>';

document.getElementById('preview').innerHTML=h;
}

function runCode(){
livePreview();
alert('🚀 تم التنفيذ! شاهد المعاينة على اليمين.');
}

updateLines();
livePreview();
</script>
</body>
</html>
