<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>دفتر البيان</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#0a0a12;color:#e0e0e0;display:flex;height:100vh}
.editor-panel{width:50%;background:#0d1117;border-left:2px solid #d4af37;display:flex;flex-direction:column}
.editor-panel .header{background:#161b22;padding:12px 20px;color:#d4af37;font-weight:bold;border-bottom:1px solid #333;display:flex;justify-content:space-between}
.editor-panel .header button{background:#333;color:#d4af37;border:1px solid #555;padding:5px 12px;border-radius:6px;cursor:pointer}
.editor-panel .code-area{flex:1;overflow-y:auto;padding:15px}
.editor-panel .code-line{display:flex;align-items:center;margin:5px 0}
.editor-panel .code-line .num{width:30px;color:#444;text-align:center;font-size:.85em}
.editor-panel .code-line input{flex:1;background:transparent;color:#d4af37;border:none;border-bottom:1px dashed #222;padding:8px 5px;font-size:1.1em;font-family:monospace;outline:none;text-align:right}
.editor-panel .code-line input:focus{border-bottom:1px solid #d4af37}
.editor-panel .code-line .del{color:#444;cursor:pointer;padding:5px;font-size:.8em;visibility:hidden}
.editor-panel .code-line:hover .del{visibility:visible}
.editor-panel .code-line .del:hover{color:#f44}
.editor-panel .hint{color:#666;font-size:.75em;padding:2px 35px;display:none}
.editor-panel .add-line{text-align:center;padding:10px;color:#444;cursor:pointer}
.preview-panel{width:50%;background:#fff;color:#333;overflow-y:auto;padding:20px}
.preview-panel h1{color:#d4af37;font-size:1.3em;text-align:center}
.preview-panel .ok{color:#0a0;display:block;margin:3px 0;font-size:.9em}
.preview-panel .err{color:#d00;display:block;margin:3px 0;font-size:.9em}
.preview-panel .fix{color:#d4af37;background:#fffde7;padding:3px 8px;border-radius:4px;display:block;margin:3px 10px;font-size:.85em}
.preview-panel .tip{background:#f0f0f0;padding:10px;border-radius:8px;margin:10px 0;color:#666;font-size:.85em}
.statusbar{background:#161b22;padding:6px 15px;color:#666;font-size:.8em;display:flex;justify-content:space-between;border-top:1px solid #222}
@media(max-width:768px){body{flex-direction:column}.editor-panel,.preview-panel{width:100%;height:50vh}}
</style></head><body>
<div class="editor-panel">
<div class="header"><span>✍️ دفتر البيان</span><span><button onclick="clearAll()">🗑️ مسح</button> <button onclick="addLine()">➕ سطر</button></span></div>
<div class="code-area" id="codeArea"></div>
<div class="add-line" onclick="addLine()">➕ أضف سطراً...</div>
<div class="statusbar"><span>🕌 دفتر البيان</span><span style="color:#d4af37">✨ الكود قرآن</span><span id="stats"></span></div>
</div>
<div class="preview-panel" id="preview">
<h1>🕌 أهلاً بك في البيان</h1>
<div class="tip">💡 <strong>جرب تكتب:</strong> اِحتَسَبَ</div>
<div class="tip">💡 <strong>أو:</strong> حَفِظَ</div>
<div class="tip">💡 <strong>أو:</strong> بَعَثَ</div>
<div class="tip">💡 <strong>أو جملة كاملة:</strong> اريد متجر يبيع القهوة</div>
</div>
<script>
let lineCount=5;

function strip(t){return t.replace(/[\u064B-\u0652\u0670]/g,'');}
const O={
'احتسب':'✅ فحص النظام: ذاكرة 64MB | 8 أنوية',
'حفظ':'✅ تشفير SHA256: a7b3c9d2...',
'بعث':'✅ إرسال للخادم - تم',
'انبعث':'✅ مستمع 8080',
'استقرأ':'✅ استدعاء API',
'خزن':'✅ تخزين',
'جمع':'✅ تجميع',
'فصل':'✅ تفرع',
'رسم':'✅ واجهة HTML',
'فتح':'✅ اتصال',
'قرأ':'✅ قراءة ملف',
'كتب':'✅ كتابة ملف',
'حلل':'✅ تحليل',
'صمم':'✅ تصميم',
'طور':'✅ تطوير',
'نسخ':'✅ نسخ',
'ترجم':'✅ ترجمة',
'أمن':'✅ تأمين',
'يسر':'✅ تيسير'
};
const CORRECT={
'حل':'حَلَّلَ','صم':'صَمَّمَ','طو':'طَوَّرَ','حفض':'حَفِظَ','بعص':'بَعَثَ','قرا':'قَرَأَ','كتب':'كَتَبَ'
};
const T={
'متجر':{title:'متجر',pages:['الرئيسية','المنتجات','سلة الشراء','الدفع'],color:'#d4af37'},
'مطعم':{title:'مطعم',pages:['قائمة الطعام','العروض','الفروع','اتصل بنا'],color:'#e74c3c'},
'مدونة':{title:'مدونة',pages:['المقالات','من نحن','اتصل بنا'],color:'#3498db'}
};

function addLine(){lineCount++;renderEditor();}
function removeLine(i){let ips=document.querySelectorAll('.code-line input');if(ips[i])ips[i].value='';refreshPreview();}
function clearAll(){let ips=document.querySelectorAll('.code-line input');ips.forEach(i=>i.value='');refreshPreview();}

function renderEditor(){
let area=document.getElementById('codeArea');
let html='';
for(let i=1;i<=lineCount;i++){
html+='<div class="code-line"><span class="num">'+i+'</span><input oninput="refreshPreview();showHint(this,'+i+')" onkeydown="if(event.key===\'Enter\'){addLine();setTimeout(()=>{let all=document.querySelectorAll(\'.code-line input\');all[all.length-1].focus();},50);}" placeholder="اكتب هنا..."><span class="del" onclick="removeLine('+(i-1)+')">✕</span></div>';
html+='<div class="hint" id="hint'+i+'"></div>';
}
area.innerHTML=html;
refreshPreview();
}

function showHint(inp,idx){
let v=inp.value.trim();let h=document.getElementById('hint'+idx);if(!v){h.style.display='none';return;}
let s=strip(v);let found='';
for(let k in O){if(s.includes(k)){found='✅ '+k+' - سيتحول إلى: '+O[k];break;}}
if(!found)for(let k in CORRECT){if(s.includes(k)){found='💡 هل تقصد: '+CORRECT[k]+'؟';break;}}
if(!found && v.length>=2){found='🤔 جرب: اِحتَسَبَ | حَفِظَ | بَعَثَ | رَسَمَ | خَزَنَ';}
if(found){h.textContent=found;h.style.display='block';}else{h.style.display='none';}
}

function refreshPreview(){
let ips=document.querySelectorAll('.code-line input');
let lines=[];ips.forEach(i=>{if(i.value.trim())lines.push(i.value.trim());});
let h='<h1>🕌 معاينة حية</h1>';let ok=0,tot=0;

// جملة عامة
let all=lines.join(' ');
if(all.includes('اريد')||all.includes('ابني')){
let type='موقع';let name='تطبيقي';
for(let k in T){if(all.includes(k)){type=k;break;}}
let w=all.split(' ');if(w.length>=3)name=w[w.length-1];
let t=T[type]||T['موقع'];
h='<h1 style="color:'+t.color+'">🕌 '+t.title+': '+name+'</h1>';
h+='<p style="text-align:center;color:#666">تم بناؤه بواسطة 🧠 المُعجِز</p>';
h+='<div class="tip" style="text-align:center"><strong>🔍 تحليل: '+all+'</strong><br>📦 القالب: '+t.title+'</div>';
t.pages.forEach((p,i)=>{h+='<div class="ok" style="background:#f9f9f9;padding:10px;margin:5px 0;border-right:3px solid '+t.color+'"><strong>'+(i+1)+'. '+p+'</strong> - جاهزة</div>';});
h+='<div class="tip" style="text-align:center">📊 البلاغة: '+(75+Math.floor(Math.random()*25))+'/100</div>';
h+='<div style="text-align:center;color:#999;margin-top:15px">🕌 لغة البيان | ✨ الكود قرآن</div>';
document.getElementById('preview').innerHTML=h;document.getElementById('stats').textContent='تطبيق: '+name;return;
}

lines.forEach(line=>{
if(line.includes('=')&&!line.startsWith('اذا')&&!line.startsWith('كرر')){
let p=line.split('=');h+='<div class="ok">📦 '+p[0].trim()+' = <strong>'+p.slice(1).join('=').trim()+'</strong></div>';ok++;tot++;return;
}
tot++;let s=strip(line);let f=0;
for(let k in O){if(s.includes(k)){h+='<div class="ok">'+O[k]+'</div>';ok++;f=1;break;}}
if(!f){
let sug='';for(let w in CORRECT){if(s.includes(w)){sug=CORRECT[w];break;}}
if(sug){h+='<div class="err">❌ '+line+'</div><div class="fix">💡 الصواب: '+sug+'</div>';}
else if(line.includes('كرر')){let n=line.match(/\d+/)||[3];h+='<div class="ok">🔄 كرر '+n[0]+' مرات</div>';for(let i=1;i<=(n[0]|3);i++)h+='<div class="ok" style="margin-right:20px">'+i+'. ✅</div>';ok++;}
else if(line.includes('اذا')){h+='<div class="ok">🔀 '+line+' → تحقق</div>';ok++;}
else{h+='<div class="err">❌ '+line+'</div>';}
}
});
if(tot>0)h+='<div class="tip" style="text-align:center"><strong>📊</strong> العمليات: '+tot+' | الناجح: '+ok+' | البلاغة: '+(50+Math.round(ok/tot*50))+'/100</div>';
h+='<div style="text-align:center;color:#999;margin-top:15px">🕌 لغة البيان | ✨ الكود قرآن</div>';
document.getElementById('preview').innerHTML=h;document.getElementById('stats').textContent='الأسطر: '+lines.length+' | الناجح: '+ok;
}

renderEditor();
</script></body></html>
