name: بناء WebAssembly

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: تثبيت Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: تثبيت wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      
      - name: بناء المشروع الرئيسي
        run: cargo build --lib
      
      - name: بناء WASM
        run: |
          cd bayan_wasm
          wasm-pack build --target web
      
      - name: رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: bayan-wasm
          path: bayan_wasm/pkg/
